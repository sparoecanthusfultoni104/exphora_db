name: Release ExphoraDB

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend deps
        working-directory: ui
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ExphoraDB ${{ github.ref_name }}'
          releaseBody: |
            ## ExphoraDB ${{ github.ref_name }}

            ### Instalación
            Descarga el archivo `.msi` o `.exe` de abajo e instálalo.

            ### Cambios
            Ver [CHANGELOG.md](https://github.com/Nuulz/Exphora_db/blob/main/CHANGELOG.md)
          releaseDraft: false
          prerelease: false
